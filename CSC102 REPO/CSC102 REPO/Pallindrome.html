<!DOCTYPE html>
<html lang="en"
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Palindrome Checker </title>


    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
    <h1> Palindrome Checker</h1>
    </header>
    <main>
        <form onsubmit="checkPalin(event);">
            <label for="txtWord">Enter a word or phrase:</label>
            <input type="text" id="txtWord">
            <input type="submit" value="Check word">
        </form>

        <!-- create a div to hold the result of the palindrome check -->
        <div id="divMessage"></div>

        <!-- We will add an audio element to this div -->
        <div id="divAudio"></div>

        <!-- this button will add an audio element to the div above -->
        <button id="btnAddAudio" onclick="addAdudio();">Add Audio</button>

        <!-- 2 buttons to handle the playing of the sound -->
        <button id="btnPlayAudio" onclick="playAdudio();" hidden>Play</button>
        <button id="btnPauseAudio" onclick="pauseAdudio();" hidden>Pause</button>

    </main>

    <Script src="Dice Game.js"></Script>

    
</body>
</html>
